# Map the "public" community string to an internal identity
com2sec notConfigUser  default       public

# Put that identity into a group, for SNMP v1 and v2c
group   notConfigGroup v1            notConfigUser
group   notConfigGroup v2c           notConfigUser

# Define what this group is allowed to see: system info + interfaces + host resources
view    systemview     included    .1.3.6.1.2.1.1 
# system (sysDescr, sysUptime, etc)
view    systemview     included    .1.3.6.1.2.1.2       
# interfaces (ifTable - traffic, errors)
view    systemview     included    .1.3.6.1.2.1.25      
# host resources (CPU, memory, disk)

# Grant read-only access to that view
access  notConfigGroup ""  any  noauth  exact  systemview  none  none

# Identity info (cosmetic, shows up in sysContact/sysLocation)
syslocation WSL Docker Lab
syscontact  Kaashvi <kaashvi@localhost>
