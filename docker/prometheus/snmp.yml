          - labelname: ifIndex
            type: gauge
        lookups: []

      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups: []

      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups: []

      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
